navigationCompose = "2.8.8"
lifecycleViewmodelCompose = "2.8.7"
fragmentKtx = "1.8.5"
dataStore = "1.1.1"
googleServices = "4.4.2"
transportationConsumer = "4.0.0"
room = "2.7.0-alpha11"
ksp = "2.0.21-1.0.26"
camerax = "1.3.4"
